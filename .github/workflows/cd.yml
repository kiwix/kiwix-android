name: CD

on:
  schedule:
    # Publish nightly each day at midnight UTC
    - cron: '0 0 * * *'
  push:
    tags:
      # On demand Google Play publishing for internal testing
      - 'internal_testing'
  release:
    types: [published]

jobs:

  release:
    runs-on: ubuntu-24.04
    steps:

      - name: Code checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27d
          link-to-sdk: true

      - name: Retrieve secrets
        env:
          KEYSTORE: ${{ secrets.keystore }}
          PLAYSTORE_JSON: ${{ secrets.PLAYSTORE_JSON }}
          KIWIX_FILE_UPLOAD_SSH_KEY: ${{ secrets.KIWIXANDROID_FILE_UPLOAD_KEY }}
        run: |
          echo "$KEYSTORE" | base64 -d > kiwix-android.keystore
          echo "$PLAYSTORE_JSON" > playstore.json
          KEY_PATH=kiwix_file_upload_ssh_key
          echo "$KIWIX_FILE_UPLOAD_SSH_KEY" > $KEY_PATH
          chmod 600 $KEY_PATH
          echo "KIWIX_FILE_UPLOAD_SSH_KEY_PATH=$KEY_PATH" >> $GITHUB_ENV

      - name: Retrieve date from git revision
        id: git_head_revision_date
        run: |
          DATE=$(git log -1 --format=%cd --date=format:%Y-%m-%d)
          echo "KIWIX_ANDROID_RELEASE_DATE=$DATE" >> $GITHUB_ENV
        shell: bash

      - name: Retrieve tag from git revision
        run: echo "TAG=$(echo ${GITHUB_REF:10})" >> $GITHUB_ENV

      - name: Nightlies and internal testing debug build
        if: ${{ ! github.event_name == 'release' }}
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          APK_BUILD: "true"
        run: ./gradlew assembleNightly

      - name: Publish nightly APK to master.download.kiwix.org
        if: ${{ github.event_name == 'cron' }}
        env:
          UNIVERSAL_DEBUG_APK: app/build/outputs/apk/nightly/*universal*.apk
        run: |
          mkdir $DATE
          cp $UNIVERSAL_DEBUG_APK $DATE
          scp -P 30322 -vrp -i "$KIWIX_FILE_UPLOAD_SSH_KEY_PATH" -o StrictHostKeyChecking=no $DATE kiwix-android@master.download.kiwix.org:/data/kiwix/nightly/

      - name: Publish release APK to master.download.kiwix.org
        if: ${{ github.event_name == 'release' }}
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          UNIVERSAL_RELEASE_APK: app/build/outputs/apk/standalone/*universal*.apk
          ARCHIVE_NAME: org.kiwix.kiwixmobile.standalone-${{ github.event.release.tag_name }}.apk
          KIWIX_ANDROID_RELEASE_DATE: ${{ env.KIWIX_ANDROID_RELEASE_DATE }}
          APK_BUILD: "true"
        run: |
          ./gradlew assembleStandalone
          cp ${UNIVERSAL_RELEASE_APK} ${ARCHIVE_NAME}
          scp -P 30322 -vrp -i "$KIWIX_FILE_UPLOAD_SSH_KEY_PATH" -o StrictHostKeyChecking=no "$ARCHIVE_NAME" kiwix-android@master.download.kiwix.org:/data/kiwix/release/kiwix-android/

      - name: Publish release "versionInfo" to master.download.kiwix.org for F-Droid
        if: ${{ github.event_name == 'release' }}
        run: |
          ./gradlew generateVersionCodeAndName
          scp -P 30322 -vrp -i "$KIWIX_FILE_UPLOAD_SSH_KEY_PATH" -o StrictHostKeyChecking=no VERSION_INFO kiwix-android@master.download.kiwix.org:/data/kiwix/release/kiwix-android/

      - name: Publish release APKs to GitHub 'Releases' section
        if: ${{ github.event_name == 'release' }}
        uses: ncipollo/release-action@v1
        with:
          artifacts: "app/build/outputs/apk/standalone/*.apk"
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ env.TAG }}
          allowUpdates: true
          replacesArtifacts: true

      - name: Publish bundle in internal testing on Google Play (for all scenarios)
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KIWIX_ANDROID_RELEASE_DATE: ${{ env.KIWIX_ANDROID_RELEASE_DATE }}
        run: |
          set +e
          ./gradlew publishPlayStoreBundle --scan 2>&1 | tee gradle_output.log
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          if grep -q "BUILD SUCCESSFUL" gradle_output.log; then
            echo "Gradle build successful."
            exit 0
          fi

          if grep -q "Try another version code." gradle_output.log; then
            echo "Upload skipped because very same version."
            exit 0
          fi

          echo "Gradle publish failed with an unexpected error:"
          cat gradle_output.log
          exit $EXIT_CODE
